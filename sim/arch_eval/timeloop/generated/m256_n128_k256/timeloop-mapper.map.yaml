mapping:
  - target: Registers
    type: datatype
    keep:
      - Outputs
    bypass:
      - Weights
      - Inputs
  - target: GlobalBuffer
    type: datatype
    keep:
      - Weights
      - Inputs
      - Outputs
    bypass:
      []
  - target: DRAM
    type: datatype
    keep:
      - Weights
      - Inputs
      - Outputs
    bypass:
      []
  - target: Registers
    type: temporal
    factors: R1 S1 P1 Q1 C8 K1 N1
    permutation: CRSPQKN
  - target: GlobalBuffer
    type: spatial
    factors: R1 S1 P1 Q1 C32 K32 N1
    permutation: CKRSPQN
    split: 1
  - target: GlobalBuffer
    type: temporal
    factors: R1 S1 P32 Q1 C1 K2 N1
    permutation: PKRSQCN
  - target: DRAM
    type: temporal
    factors: R1 S1 P8 Q1 C1 K2 N1
    permutation: PKRSQCN